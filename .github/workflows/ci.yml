# =============================================================================
# CI ワークフロー（MiraStudy: React + TypeScript + Vite）
# =============================================================================
# project-config.yml の toolchain 設定（typescript / npm）に合わせて構成。

name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---------------------------------------------------------------
      # 言語セットアップ（MiraStudy は TypeScript / npm を採用）
      # ---------------------------------------------------------------
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ---------------------------------------------------------------
      # 品質チェック
      # ---------------------------------------------------------------

      - name: Policy check
        run: python3 ci/policy_check.py

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      # ---------------------------------------------------------------
      # セキュリティ: 依存パッケージ脆弱性スキャン
      # ---------------------------------------------------------------
      - name: Audit dependencies (npm audit)
        # 開発専用ツール（vite/vitest 等）の脆弱性は本番に影響しないため対象外にする
        run: npm audit --omit=dev --audit-level=high

  # =====================================================================
  # シークレットスキャン（gitleaks）
  # =====================================================================
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
